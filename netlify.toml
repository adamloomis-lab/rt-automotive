[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # playwright is only used by the POS price-sync GitHub Action, never the site
  # build, so don't download a browser during Netlify installs.
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Friendly path for the live Google reviews function.
[[redirects]]
  from = "/api/reviews"
  to = "/.netlify/functions/reviews"
  status = 200

# Prerendered per-route HTML is served directly (Netlify serves existing files
# before applying this fallback). The fallback only catches client-side routes
# that have no prerendered file.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
